services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  migrate:
    build:
      context: ./apps/api
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file: .env
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: sh -c "alembic upgrade head"
    restart: "no"

  api:
    build:
      context: ./apps/api
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file: .env
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/api:/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command:
      - sh
      - -c
      - |
        if [ "${VERBOSE_DOCKER_LOGS:-false}" = "true" ]; then
          exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
        fi
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level warning --no-access-log

  worker:
    build:
      context: ./apps/worker
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file: .env
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ari-controller:
        condition: service_started
    volumes:
      - ./apps/worker:/app
    command:
      - sh
      - -c
      - |
        if [ "${VERBOSE_DOCKER_LOGS:-false}" = "true" ]; then
          exec celery -A worker.celery_app.celery_app worker --loglevel=info
        fi
        exec celery -A worker.celery_app.celery_app worker --loglevel=warning

  beat:
    build:
      context: ./apps/worker
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file: .env
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./apps/worker:/app
    command:
      - sh
      - -c
      - |
        if [ "${VERBOSE_DOCKER_LOGS:-false}" = "true" ]; then
          exec celery -A worker.celery_app.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
        fi
        exec celery -A worker.celery_app.celery_app beat --loglevel=warning --schedule /tmp/celerybeat-schedule

  ari-controller:
    build:
      context: ./apps/ari-controller
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    env_file: .env
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    ports:
      - "8090:8090"
    volumes:
      - ./apps/ari-controller:/app
    command:
      - sh
      - -c
      - |
        if [ "${VERBOSE_DOCKER_LOGS:-false}" = "true" ]; then
          exec uvicorn ari_app.main:app --host 0.0.0.0 --port 8090 --reload --log-level info
        fi
        exec uvicorn ari_app.main:app --host 0.0.0.0 --port 8090 --reload --log-level warning --no-access-log

  web:
    build:
      context: ./apps/web
    env_file: .env
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
